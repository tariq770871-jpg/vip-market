<main>
  <section>
    <h2>المنتجات</h2>
    <div id="products" class="products-grid"></div>
  </section>

  <section>
    <h2>سلة المشتريات</h2>
    <div id="cart"></div>
    <p id="total">الإجمالي: 0 $</p>
    <button onclick="checkout()">إتمام الطلب</button>
  </section>
</main>
<section id="admin">
  <h2>لوحة التحكم</h2>
  <form id="addProductForm">
    <input type="text" id="productName" placeholder="اسم المنتج" required>
    <input type="text" id="productDescription" placeholder="الوصف">
    <input type="number" id="productPrice" placeholder="السعر" required>
    <button type="submit">إضافة المنتج</button>
  </form>
</section>
<section id="auth">
  <h2>تسجيل الدخول</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button type="submit">دخول</button>
  </form>
</section>
