<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP MARKET | Global System</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0b0b;
    --card:#1a1a1a;
    --gold:#d4af37;
    --text:#fff;
    --muted:#aaa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Tajawal';
}

body{
    background:var(--bg);
    color:var(--text);
}

/* الهيدر العالمي */
header{
    padding:18px;
    text-align:center;
    background:#111;
    color:var(--gold);
    font-weight:900;
    position:sticky;
    top:0;
}

/* لوحة التحكم */
.nav{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:15px;
    max-width:900px;
    margin:auto;
}

/* أزرار النظام */
.btn{
    background:var(--card);
    border:1px solid #333;
    color:var(--text);
    padding:20px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.btn:hover{
    background:var(--gold);
    color:#000;
    transform:scale(1.02);
}

/* الصفحات */
.page{
    display:none;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.active{
    display:block;
}

/* كارد داخلي */
.card{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    border:1px solid #333;
}

h2{
    color:var(--gold);
}
</style>
</head>

<body>

<header>🌍 VIP MARKET - GLOBAL CORE SYSTEM</header>

<!-- لوحة التحكم -->
<div class="nav">

    <button class="btn" onclick="openPage('shop')">🛒 المتجر العالمي</button>
    <button class="btn" onclick="openPage('apps')">📱 التطبيقات</button>
    <button class="btn" onclick="openPage('learn')">📚 تعليم الربح</button>
    <button class="btn" onclick="openPage('ai')">🤖 أدوات AI</button>

</div>

<!-- الأقسام -->

<div id="shop" class="page active">
    <div class="card">
        <h2>🛒 المتجر العالمي</h2>
        <p>هنا سيتم ربط المنتجات + الدفع + Supabase لاحقاً</p>
    </div>
</div>

<div id="apps" class="page">
    <div class="card">
        <h2>📱 متجر التطبيقات</h2>
        <p>نظام تحميل + أدوات + روابط خارجية</p>
    </div>
</div>

<div id="learn" class="page">
    <div class="card">
        <h2>📚 تعليم الربح</h2>
        <p>كورسات + مقالات + نظام اشتراك لاحقاً</p>
    </div>
</div>

<div id="ai" class="page">
    <div class="card">
        <h2>🤖 أدوات الذكاء الاصطناعي</h2>
        <p>تكامل APIs + أدوات تسويق + توليد محتوى</p>
    </div>
</div>

<script>
function openPage(id){

    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
