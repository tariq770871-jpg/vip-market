<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VIP MARKET للخدمات الرقمية والشحن الإلكتروني - تداول، ربح من الإنترنت، شحن، تطبيقات برو، وأدوات ذكاء اصطناعي">
    <meta name="keywords" content="شحن عملات رقمية، تداول في اليمن، VIP MARKET، ربح من الإنترنت، باينانس اليمن">
    <meta name="author" content="Tariq Al-Jadli">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#ffffff">
    
    <title>VIP MARKET | للخدمات الرقمية والشحن الإلكتروني</title>
    
    <link rel="canonical" href="https://tariq-aljadli.github.io/yemenvipmarket/">
    
    <meta name="google-site-verification" content="PENDING_VERIFICATION" />

    <meta property="og:title" content="VIP MARKET | للخدمات الرقمية">
    <meta property="og:url" content="https://tariq-aljadli.github.io/yemenvipmarket/">
    <meta property="og:type" content="website">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8776743718706581" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #f5f5f5; --bg2: #ffffff; --card: #ffffff; --card2: #f0f0f0;
            --text: #111111; --text2: #222222; --muted: #555555;
            --gold: #8a6d0b; --gold2: #b8960f; --gold3: #d4af37;
            --border: rgba(0,0,0,0.08); --glass: rgba(255,255,255,0.95); --ai: #00b8d4;
        }
        [data-theme="dark"] {
            --bg: #050505; --bg2: #0a0a0a; --card: #111111; --card2: #181818;
            --text: #ffffff; --text2: #cccccc; --muted: #999999;
            --gold: #d4af37; --gold2: #ffd700; --gold3: #b8960f;
            --border: rgba(212,175,55,0.2); --glass: rgba(10,10,10,0.9); --ai: #00e5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; transition: 0.3s; overflow-x: hidden; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; border-radius: 50%; background: var(--gold); animation: rise linear infinite; opacity: 0; }
        @keyframes rise { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 5% { opacity: 0.4; } 100% { transform: translateY(-10vh) scale(2); opacity: 0; } }
        .header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .header-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-diamond { width: 32px; height: 32px; background: linear-gradient(135deg, #6b5008, #b8960f); transform: rotate(45deg); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
        .logo-diamond span { transform: rotate(-45deg); font-weight: 900; color: #000; }
        .logo-text .site-name { font-size: 16px; font-weight: 900; color: var(--gold); }
        .icon-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .main-container { padding: 90px 20px 40px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; }
        .btn-3d { padding: 12px 32px; background: linear-gradient(180deg, #b8960f, #8a6d0b); color: #fff; border-radius: 50px; border: none; cursor: pointer; font-weight: 800; box-shadow: 0 4px 0 #6b5008; }
        .article-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; cursor: pointer; }
        .article-card img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .dashboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .dashboard-table th, .dashboard-table td { padding: 10px; border: 1px solid var(--border); text-align: center; }
        .ai-float-btn { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; border-radius: 50%; background: #00e5ff; border: none; cursor: pointer; font-size: 24px; box-shadow: 0 4px 15px rgba(0,229,255,0.4); }
    </style>
</head>
<body>
    <div id="particles"></div>
    <header class="header">
        <div class="header-inner">
            <div class="logo-area">
                <div class="logo-diamond"><span>V</span></div>
                <div class="logo-text"><span class="site-name">VIP MARKET</span></div>
            </div>
            <div class="header-actions" style="display:flex; gap:10px;">
                <button class="icon-btn" onclick="navigate('home')">🏠</button>
                <button class="icon-btn" onclick="navigate('blog')">📝</button>
                <button class="icon-btn" onclick="navigate('dashboard')">📊</button>
                <button class="icon-btn" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <section class="page active" id="page-home">
            <div class="hero">
                <h1>مرحباً بك في <span style="color:var(--gold);">VIP MARKET</span></h1>
                <p>منصتك للخدمات الرقمية والشحن في اليمن</p><br>
                <button class="btn-3d" onclick="navigate('blog')">اقرأ المقالات</button>
            </div>
        </section>

        <section class="page" id="page-blog">
            <h2 style="text-align:center; margin-bottom:20px;">📝 مقالات تعليمية</h2>
            <div class="article-card" onclick="alert('سيتم إضافة تفاصيل المقال قريباً')">
                <img src="https://via.placeholder.com/100" alt="article">
                <div><h3>أفضل طرق الربح في اليمن 2026</h3><p>دليل شامل للعمل الحر...</p></div>
            </div>
        </section>

        <section class="page" id="page-dashboard">
            <div class="hero">
                <h2>📊 لوحة التحكم</h2>
                <div id="login-form">
                    <input type="password" id="pass" placeholder="كلمة المرور" style="padding:10px; border-radius:8px; border:1px solid var(--border);"><br><br>
                    <button class="btn-3d" onclick="login()">دخول</button>
                </div>
                <div id="dash-content" style="display:none;">
                    <table class="dashboard-table">
                        <thead><tr><th>الطلب</th><th>الحالة</th></tr></thead>
                        <tbody><tr><td>شحن USDT</td><td>✅ مكتمل</td></tr></tbody>
                    </table>
                    <br><button onclick="logout()">خروج</button>
                </div>
            </div>
        </section>
    </main>

    <button class="ai-float-btn">🤖</button>

    <script>
        function navigate(p){
            document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            if(p==='dashboard' && localStorage.getItem('vip-auth')==='true') showDash();
        }
        function toggleTheme(){
            const h=document.documentElement;
            const t=h.getAttribute('data-theme')==='dark'?'light':'dark';
            h.setAttribute('data-theme',t);
        }
        function login(){
            if(document.getElementById('pass').value==='1234'){
                localStorage.setItem('vip-auth','true');
                showDash();
            }else{alert('خطأ!')}
        }
        function showDash(){
            document.getElementById('login-form').style.display='none';
            document.getElementById('dash-content').style.display='block';
        }
        function logout(){
            localStorage.removeItem('vip-auth');
            location.reload();
        }
        function createParticle(){
            const p=document.createElement('div');
            p.classList.add('particle');
            p.style.width='3px'; p.style.height='3px';
            p.style.left=Math.random()*100+'%';
            p.style.animationDuration=Math.random()*5+5+'s';
            document.getElementById('particles').appendChild(p);
            setTimeout(()=>p.remove(),10000);
        }
        setInterval(createParticle,500);

        // استرجاع الدخول عند التحديث
        window.onload = () => {
            if(localStorage.getItem('vip-auth')==='true' && document.getElementById('page-dashboard').classList.contains('active')) showDash();
        };
    </script>
</body>
</html>
