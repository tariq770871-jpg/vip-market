<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة احترافية</title>

<style>
:root{
--main:#22c55e;
--bg:#0f172a;
--card:#020617;
}

*{box-sizing:border-box}
body{
margin:0;font-family:system-ui;
background:var(--bg);color:#fff;
}

/* NAV */
.nav{
display:flex;justify-content:space-between;
padding:15px;background:#020617;
position:fixed;width:100%;top:0;z-index:10
}
.menu{font-size:24px;cursor:pointer}

/* SIDEBAR */
.sidebar{
position:fixed;top:0;right:-100%;
width:80%;height:100%;
background:#020617;padding:20px;
transition:.3s;z-index:20
}
.sidebar.active{right:0}
.sidebar a{
display:block;padding:14px 0;
border-bottom:1px solid #333;
font-size:18px
}

/* HERO */
.hero{
padding:100px 20px 40px;
text-align:center
}
.hero h1{font-size:28px}
.btn{
display:block;width:100%;
margin-top:15px;
padding:14px;
background:var(--main);
border-radius:10px;
text-align:center;
font-weight:bold
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:15px;padding:20px
}
.card{
background:var(--card);
padding:20px;border-radius:12px;
text-align:center
}

/* DESKTOP */
@media(min-width:768px){
.grid{grid-template-columns:repeat(3,1fr)}
.hero h1{font-size:40px}
.sidebar{width:300px}
}

/* MODAL */
.modal{
display:none;
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.7);
justify-content:center;align-items:center
}
.box{
background:#020617;
padding:20px;border-radius:10px;
width:90%;max-width:350px
}
input{
width:100%;padding:12px;
margin:8px 0;border:none;border-radius:8px
}

/* AI */
.ai{
position:fixed;bottom:15px;left:15px;
width:55px;height:55px;
background:var(--main);
border-radius:50%;
display:flex;justify-content:center;align-items:center;
font-size:22px;cursor:pointer
}
</style>
</head>

<body>

<div class="nav">
<div class="menu" onclick="toggle()">☰</div>
<div>منصتي</div>
</div>

<div class="sidebar" id="side">
<a onclick="openModal('login')">تسجيل الدخول</a>
<a onclick="openModal('signup')">إنشاء حساب</a>
<a>الدخول كزائر</a>
<a href="#services">الخدمات</a>
<a href="#about">من نحن</a>
<a href="#contact">تواصل</a>
<a href="#privacy">الخصوصية</a>
</div>

<section class="hero">
<h1>ابدأ مشروعك الرقمي بسهولة</h1>
<p>واجهة سريعة ومتجاوبة على كل الأجهزة</p>
<div class="btn">ابدأ الآن</div>
</section>

<section id="services" class="grid">
<div class="card">تسويق</div>
<div class="card">تحليل</div>
<div class="card">ذكاء اصطناعي</div>
</section>

<section id="about" class="grid">
<div class="card">نحن نساعدك تنجح رقمياً</div>
</section>

<section id="contact" class="grid">
<div class="card">
<input placeholder="اسمك">
<input placeholder="بريدك">
<input placeholder="رسالتك">
<div class="btn">إرسال</div>
</div>
</section>

<section id="privacy" class="grid">
<div class="card">نحمي بياناتك بالكامل</div>
</section>

<div class="ai">🤖</div>

<div class="modal" id="modal">
<div class="box" id="content"></div>
</div>

<script>
function toggle(){
document.getElementById("side").classList.toggle("active")
}

function openModal(type){
let c=''
if(type==='login'){
c=`<h3>دخول</h3>
<input placeholder="البريد">
<input type="password" placeholder="كلمة المرور">
<div class="btn">دخول</div>`
}else{
c=`<h3>تسجيل</h3>
<input placeholder="الاسم">
<input placeholder="البريد">
<input type="password" placeholder="كلمة المرور">
<div class="btn">اشتراك</div>`
}
document.getElementById("content").innerHTML=c
document.getElementById("modal").style.display="flex"
}

document.getElementById("modal").onclick=(e)=>{
if(e.target.id==='modal'){
e.target.style.display='none'
}
}
</script>

</body>
</html>
