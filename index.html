<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VIP MARKET للخدمات الرقمية والشحن الإلكتروني">
    <meta name="theme-color" content="#0a0a0a">
    <title>VIP MARKET | للخدمات الرقمية والشحن الإلكتروني</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8776743718706581" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #050505; --bg2: #0a0a0a; --card: #111111; --card2: #181818;
            --text: #ffffff; --text2: #cccccc; --muted: #999999;
            --gold: #d4af37; --gold2: #ffd700; --gold3: #b8960f;
            --border: rgba(212, 175, 55, 0.2); --glow: rgba(212, 175, 55, 0.12);
            --glass: rgba(10, 10, 10, 0.9); --ai: #00e5ff;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --bg2: #ffffff; --card: #ffffff; --card2: #f0f0f0;
            --text: #111111; --text2: #222222; --muted: #555555;
            --border: rgba(0,0,0,0.1); --glass: rgba(255,255,255,0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Tajawal', 'Cairo', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: 0.3s; overflow-x: hidden; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; border-radius: 50%; background: var(--gold); animation: rise linear infinite; opacity: 0; }
        @keyframes rise { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 5% { opacity: 0.6; } 60% { opacity: 0.2; } 100% { transform: translateY(-10vh) scale(2); opacity: 0; } }

        /* ===== المساعد العائم ===== */
        .ai-float-btn {
            position: fixed; bottom: 25px; left: 25px; z-index: 9998;
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #00e5ff, #00b8d4);
            border: none; cursor: pointer; font-size: 28px; color: #000;
            box-shadow: 0 8px 25px rgba(0,229,255,0.4);
            display: flex; align-items: center; justify-content: center;
            animation: floatBounce 2s infinite; transition: all 0.3s;
        }
        .ai-float-btn:hover { transform: scale(1.1); box-shadow: 0 12px 35px rgba(0,229,255,0.6); }
        @keyframes floatBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* نافذة المحادثة */
        .chat-window {
            position: fixed; bottom: 100px; left: 25px;
            width: 380px; max-width: 90vw; height: 500px; max-height: 70vh;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; z-index: 9999;
            display: none; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .chat-window.open { display: flex; }
        .chat-window.fullscreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            max-width: 100%; max-height: 100%; bottom: 0; border-radius: 0;
            z-index: 10000;
        }

        .chat-header {
            background: linear-gradient(135deg, #00b8d4, #00e5ff);
            padding: 14px 18px; display: flex; align-items: center;
            justify-content: space-between; color: #000; font-weight: 700;
            cursor: pointer;
        }
        .chat-header .title { font-size: 16px; }
        .chat-header .actions { display: flex; gap: 10px; }
        .chat-header .actions button {
            background: transparent; border: none; color: #000;
            font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .chat-header .actions button:hover { transform: scale(1.2); }

        .chat-body {
            flex: 1; padding: 15px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 10px; background: var(--bg2);
        }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.6; animation: msgIn 0.3s ease; }
        .msg.bot { background: var(--card2); color: var(--text); align-self: flex-start; border-bottom-right-radius: 5px; border: 1px solid var(--border); }
        .msg.user { background: linear-gradient(135deg, #00b8d4, #00e5ff); color: #000; align-self: flex-end; border-bottom-left-radius: 5px; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin: 5px 0; }
        .quick-btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--gold); padding: 7px 14px; border-radius: 20px;
            font-size: 11px; cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .quick-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        .chat-input-area {
            display: flex; gap: 8px; padding: 12px; background: var(--card);
            border-top: 1px solid var(--border);
        }
        .chat-input-area input {
            flex: 1; padding: 10px 14px; border-radius: 25px;
            border: 1px solid var(--border); background: var(--bg2);
            color: var(--text); font-family: inherit; font-size: 13px;
            outline: none;
        }
        .chat-input-area button {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #00e5ff, #00b8d4);
            border: none; color: #000; font-size: 16px; cursor: pointer;
            transition: 0.2s;
        }
        .chat-input-area button:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="particles"></div>

    <!-- ===== المساعد العائم ===== -->
    <button class="ai-float-btn" onclick="toggleChat()" title="مافي نفسك؟">🤖</button>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span class="title">🤖 مافي نفسك؟</span>
            <div class="actions">
                <button onclick="toggleFullscreen()" title="تكبير">⛶</button>
                <button onclick="toggleChat()" title="إغلاق">✕</button>
            </div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="msg bot">
                مرحباً! أنا <strong>"مافي نفسك؟"</strong> مساعدك الذكي في VIP MARKET. كيف أقدر أخدمك؟
            </div>
            <div class="quick-btns">
                <button class="quick-btn" onclick="sendQuick('التداول')">📈 التداول</button>
                <button class="quick-btn" onclick="sendQuick('الربح')">💰 الربح</button>
                <button class="quick-btn" onclick="sendQuick('الشحن')">⚡ الشحن</button>
                <button class="quick-btn" onclick="sendQuick('التطبيقات')">📱 التطبيقات</button>
                <button class="quick-btn" onclick="sendQuick('أدوات AI')">🤖 أدوات AI</button>
                <button class="quick-btn" onclick="sendQuick('واتساب')">📞 واتساب</button>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()">📤</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            document.getElementById('chatWindow').classList.toggle('open');
        }
        function toggleFullscreen() {
            document.getElementById('chatWindow').classList.toggle('fullscreen');
        }

        function sendMsg() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            addMsg(msg, 'user');
            input.value = '';
            setTimeout(() => botReply(msg), 500);
        }

        function sendQuick(topic) {
            addMsg(topic, 'user');
            setTimeout(() => botReply(topic), 500);
        }

        function addMsg(text, type) {
            const body = document.getElementById('chatBody');
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }

        function botReply(msg) {
            const m = msg.toLowerCase();
            let reply = '';
            if (m.includes('تداول') || m.includes('تحليل') || m.includes('شموع')) {
                reply = '📈 قسم التداول: نعلمك من الصفر للاحتراف - تحليل الشموع اليابانية - استراتيجيات المنصات العالمية - إشارات يومية. تواصل معنا للاشتراك!';
            } else if (m.includes('ربح') || m.includes('انترنت')) {
                reply = '💰 قسم الربح من الإنترنت: طرق مضمونة 100% - عمل من المنزل - مشاريع رقمية - دورات تعليمية. اسأل عن الباقات!';
            } else if (m.includes('شحن') || m.includes('محفظة') || m.includes('رصيد')) {
                reply = '⚡ قسم الشحن: محافظ يمنية - منصات عالمية - بطاقات ألعاب - رصيد اتصالات - خدمة 24 ساعة. تواصل واتساب: +967782138587';
            } else if (m.includes('تطبيق') || m.includes('برو')) {
                reply = '📱 قسم التطبيقات: تطبيقات برو مدفوعة مجاناً - أدوات احترافية - تحديثات مستمرة. اطلب تطبيقك!';
            } else if (m.includes('ai') || m.includes('ذكاء') || m.includes('ادوات')) {
                reply = '🤖 أدوات AI: ChatGPT - Gemini - Midjourney - DALL-E - Copilot - Claude - Canva AI - Notion AI. كلها في قسم الأدوات!';
            } else if (m.includes('واتس') || m.includes('تواصل') || m.includes('رقم')) {
                reply = '📞 تواصل معنا: واتساب: +967782138587 | تيليجرام: @tariq77087 | فيسبوك: VIP MARKET | بريد: tariq770871@gmail.com';
            } else if (m.includes('سلام') || m.includes('هلا') || m.includes('مرحبا')) {
                reply = 'وعليكم السلام! مرحباً بك في VIP MARKET. كيف أقدر أخدمك؟ 😊';
            } else if (m.includes('شكر')) {
                reply = 'العفو! أي service ثانية تحتاجها؟ 😊';
            } else {
                reply = 'شكراً على سؤالك! تقدر تتواصل مع فريقنا على واتساب: +967782138587 للمساعدة الفورية. 📞';
            }
            addMsg(reply, 'bot');
        }
    </script>
</body>
</html>
