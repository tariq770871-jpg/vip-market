  <script>
    // المؤشر الموحد
    const cursor = document.getElementById('custom-cursor');
    const ring = document.getElementById('cursor-ring');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      ring.style.left = e.clientX + 'px';
      ring.style.top = e.clientY + 'px';
    });
    document.addEventListener('mousedown', () => { ring.style.transform = 'translate(-50%, -50%) scale(0.8)'; });
    document.addEventListener('mouseup', () => { ring.style.transform = 'translate(-50%, -50%) scale(1)'; });
    // Particles
    particlesJS("particles-js", {
      "particles": { "number": { "value": 60 }, "color": { "value": "#f2ca50" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "color": "#f2ca50", "opacity": 0.15 }, "move": { "speed": 1.5 } },
      "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
    });
    // Scroll
    const observer = new IntersectionObserver((e) => { e.forEach(en => { if (en.isIntersecting) en.target.classList.add('visible'); }); }, { threshold: 0.1 });
    document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
